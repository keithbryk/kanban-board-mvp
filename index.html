<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Kanban Workflow Pipeline</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #0d1117; color: #c9d1d9; margin: 0; }
        .header { max-width: 1400px; margin: 0 auto 20px; text-align: center; }
        .search-container { max-width: 600px; margin: 0 auto 20px; }
        .search-input { width: 100%; padding: 12px 20px; border-radius: 8px; border: 2px solid #30363d; background: #161b22; color: #c9d1d9; font-size: 16px; }
        .search-input:focus { outline: none; border-color: #58a6ff; }
        .board { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .column { background: #161b22; padding: 15px; width: 280px; border-radius: 8px; border: 1px solid #30363d; flex-shrink: 0; }
        .column-header { margin: 0 0 15px 0; padding: 10px; border-radius: 4px; font-weight: bold; text-align: center; }
        .column-ideation { background: #1f6feb; }
        .column-definition { background: #238636; }
        .column-dev { background: #8957e5; }
        .column-review { background: #d29922; }
        .column-done { background: #388bfd; }
        .task { background: #21262d; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #30363d; }
        .task-title { font-weight: bold; margin-bottom: 8px; color: #e6edf3; }
        .task-notes { font-size: 12px; color: #8b949e; margin-top: 8px; padding-top: 8px; border-top: 1px solid #30363d; max-height: 80px; overflow-y: auto; }
        .add-task { margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: 10px; margin-top: 8px; font-family: inherit; }
        textarea:focus { outline: none; border-color: #58a6ff; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #161b22; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Kanban Workflow Pipeline</h1>
    </div>
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search notes, tasks, or columns..." oninput="filterBoard()">
    </div>
    <div class="add-task">
        <input type="text" id="taskInput" placeholder="Enter a new task..." style="padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #c9d1d9;">
        <button id="addTaskBtn">Add Task</button>
    </div>
    <div class="board" id="board">Loading...</div>
    <script src="app.js"></script>
    <script>
        function filterBoard() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tasks = document.querySelectorAll('.task');
            tasks.forEach(task => {
                const text = task.innerText.toLowerCase();
                const notes = task.querySelector('.task-notes')?.innerText.toLowerCase() || '';
                const column = task.closest('.column').querySelector('.column-header').innerText.toLowerCase();
                const show = text.includes(query) || notes.includes(query) || column.includes(query);
                task.style.display = show ? '' : 'none';
            });
        }
    </script>
</body>
</html>
