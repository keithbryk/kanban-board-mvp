<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Kanban Board</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .board { display: flex; gap: 10px; flex-wrap: wrap; }
        .column { background: white; padding: 15px; width: 350px; border: 2px solid #ccc; }
        .column h3 { margin: 0 0 10px 0; background: #4CAF50; color: white; padding: 5px; }
        .task { background: #fff; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; }
        .task-notes { font-size: 12px; color: #666; margin-top: 5px; padding-top: 5px; border-top: 1px solid #eee; }
        .add-task { margin-bottom: 20px; }
        textarea { width: 100%; height: 60px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>📋 Kanban Board</h1>
    <div class="add-task">
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button id="addTaskBtn">Add Task</button>
    </div>
    <div class="board" id="board">Loading...</div>
    <script src="app.js"></script>
</body>
</html>
